; Example project for KarenWiFiCore library — FreeRTOS mode switching.
; Open this folder as a PlatformIO project to build and upload.

[env:weactstudio_esp32c3coreboard]
platform = espressif32
board = weactstudio_esp32c3coreboard
framework = arduino

; Points PlatformIO to the library root (two levels up from this file)
lib_extra_dirs = ../..
